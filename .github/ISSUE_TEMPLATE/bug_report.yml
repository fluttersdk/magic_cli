name: Bug Report
description: Report a bug in Magic CLI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `magic make:model User -mcf`
        2. Check generated files in `lib/app/`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command Used
      description: The exact magic command that triggered the issue.
      placeholder: "magic make:controller Admin/UserMonitor --resource --model User"
      render: bash

  - type: textarea
    id: code
    attributes:
      label: Generated Code / Error Output
      description: Paste the generated code or error output.
      render: dart

  - type: input
    id: cli-version
    attributes:
      label: Magic CLI Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      placeholder: "3.27.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
