name: Documentation Issue
description: Report incorrect, missing, or unclear documentation
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the Magic CLI documentation!

  - type: input
    id: page
    attributes:
      label: Documentation Page
      description: Which section or page has the issue?
      placeholder: "README.md command reference or https://magic.fluttersdk.com/packages/magic-cli"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Incorrect information
        - Missing information
        - Unclear explanation
        - Broken code example
        - Missing code example
        - Typo
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Fix
      description: How should the documentation be corrected?
