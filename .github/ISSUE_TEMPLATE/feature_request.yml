name: Feature Request
description: Suggest a new feature or enhancement for Magic CLI
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Magic CLI? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like to see?
      placeholder: A clear description of the feature and why it's needed.
    validations:
      required: true

  - type: textarea
    id: command-syntax
    attributes:
      label: Proposed Command Syntax
      description: If this involves a new command, what syntax would you expect?
      placeholder: |
        magic make:job SendWelcomeEmail
        magic make:notification OrderShipped --channel=mail,database
      render: bash

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a real scenario where you'd use this feature.
      placeholder: "When scaffolding a new feature, I need to generate multiple related files..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: code
    attributes:
      label: Expected Generated Code
      description: What should the generated code look like?
      render: dart
